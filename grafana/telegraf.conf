# Telegraf configuration — RPi Car telemetry pipeline
# Receives InfluxDB line-protocol POSTs from the car on port 8186
# and forwards to InfluxDB 2.x.

[agent]
  interval            = "1s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 10000
  flush_interval      = "5s"
  omit_hostname       = false

# ── INPUT: influxdb_listener (car POSTs line-protocol here) ──────────────────
[[inputs.influxdb_listener]]
  service_address = ":8186"
  ## Maximum allowed HTTP request body size in bytes.
  max_body_size = "500MB"
  ## Set one or more allowed client CA certificate file names to
  ## enable mutually authenticated TLS connections
  # tls_allowed_cacerts = ["/etc/telegraf/clientca.pem"]

# ── OUTPUT: InfluxDB v2 ───────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["${INFLUX_URL}"]
  token        = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket       = "car_telemetry"

  ## Optional TLS Config
  # tls_ca = "/etc/telegraf/ca.pem"
  # tls_cert = "/etc/telegraf/cert.pem"
  # tls_key = "/etc/telegraf/key.pem"
  ## Use SSL but skip chain & host verification
  insecure_skip_verify = false
